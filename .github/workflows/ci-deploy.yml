# .github/workflows/ci-deploy.yml
#
# Pipeline:
#   • Every PR       → lint, type-check, build (fast feedback, no deploy)
#   • Push to main   → same checks → deploy to Vercel production
#   • Push to other  → same checks → deploy to Vercel preview
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   VERCEL_TOKEN        – from vercel.com/account/tokens
#   VERCEL_ORG_ID       – from .vercel/project.json after `vercel link`
#   VERCEL_PROJECT_ID   – from .vercel/project.json after `vercel link`

name: CI / Deploy

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true          # cancel old runs when a new push arrives

env:
  NODE_VERSION: "20"
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

# ─────────────────────────────────────────────
# JOB 1 — Quality checks (runs on every event)
# ─────────────────────────────────────────────
jobs:
  quality:
    name: Lint · Type-check · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: TypeScript — type-check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

      - name: Next.js build (smoke test)
        run: npm run build
        env:
          # Prevents build failing on ESLint warnings
          NEXT_TELEMETRY_DISABLED: 1

      - name: Upload build artefact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next/
          retention-days: 1

# ─────────────────────────────────────────────
# JOB 2 — Vercel Preview (non-main branches)
# ─────────────────────────────────────────────
  deploy-preview:
    name: Deploy → Vercel Preview
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'push' && github.ref != 'refs/heads/main'

    environment:
      name: Preview
      url: ${{ steps.deploy.outputs.preview-url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - run: npm ci --prefer-offline

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build for Vercel
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy preview
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "preview-url=$URL" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🚀 Preview deployed\n\n**URL:** ${{ steps.deploy.outputs.preview-url }}\n\nCommit: \`${{ github.sha }}\``
            })

# ─────────────────────────────────────────────
# JOB 3 — Vercel Production (main only)
# ─────────────────────────────────────────────
  deploy-production:
    name: Deploy → Vercel Production
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    environment:
      name: Production
      url: https://yourname.dev          # ← replace with your domain

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - run: npm ci --prefer-offline

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build for Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
